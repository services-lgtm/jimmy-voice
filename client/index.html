<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>GBS — Go Build Supply · Order smarter. Build faster.</title>
    <meta name="description" content="Same-day delivery on 5,000+ building materials. NYC's contractor supply platform. Spec jobs with Jimmy AI." />
    <link rel="icon" type="image/png" href="/brand/GBS-Icon-Square.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&family=Barlow+Condensed:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>:root { --font-inter: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
  </head>
  <body>
    <div id="root"></div>
    <!--
      Migration cleanup: the domain previously ran on BigCommerce, which may have
      registered a service worker + caches on visitors' devices. Those persist
      across the DNS switch and would keep serving the old store. Unregister any
      stale worker and purge caches once, then reload so the new site shows.
    -->
    <script>
      (function () {
        try {
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              var hadWorker = regs && regs.length > 0;
              regs.forEach(function (r) { r.unregister(); });
              if (window.caches && caches.keys) {
                caches.keys().then(function (keys) {
                  keys.forEach(function (k) { caches.delete(k); });
                });
              }
              if (hadWorker && !sessionStorage.getItem("gbs-sw-cleared")) {
                sessionStorage.setItem("gbs-sw-cleared", "1");
                location.reload();
              }
            }).catch(function () {});
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>
</html>
